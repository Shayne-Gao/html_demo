<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML Demo Space</title>
  <style>
    :root {
      --bg: #0d1322;
      --panel: rgba(255, 255, 255, 0.06);
      --line: rgba(255, 255, 255, 0.1);
      --text: #f2ead8;
      --text-soft: #b7b0a1;
      --accent: #e5bc6a;
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.38);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(117, 150, 255, 0.15), transparent 24%),
        radial-gradient(circle at bottom right, rgba(229, 188, 106, 0.16), transparent 24%),
        linear-gradient(180deg, #0b1020 0%, #131b30 100%);
    }

    .panel {
      width: min(760px, 100%);
      padding: 40px 36px;
      border-radius: 28px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.07), rgba(255, 255, 255, 0.04));
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .eyebrow {
      display: inline-flex;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(229, 188, 106, 0.08);
      border: 1px solid rgba(229, 188, 106, 0.16);
      color: var(--accent);
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h1 {
      margin: 18px 0 16px;
      font-size: clamp(28px, 4vw, 46px);
      line-height: 1.15;
    }

    p {
      margin: 0;
      color: var(--text-soft);
      font-size: 15px;
      line-height: 1.9;
    }

    .note {
      margin-top: 24px;
      padding: 16px 18px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: var(--panel);
    }

    .note strong {
      color: var(--text);
    }
  </style>
</head>
<body>
  <main class="panel">
    <div class="eyebrow">HTML Demo Space</div>
    <h1>这是一个用于临时 HTML 演示的 GitHub Pages 空间。</h1>
    <p>
      这里不展示具体 demo 列表，也不公开页面命名约定。实际演示内容会按独立路径管理，用于临时预览、内部 review 或分享访问。
    </p>
    <div class="note">
      <p><strong>说明：</strong>如果你能看到这个页面，说明 GitHub Pages 根路径工作正常。具体 demo 入口会通过单独链接访问，而不是在这里暴露。</p>
    </div>
  </main>
</body>
</html>
