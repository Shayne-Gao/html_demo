<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>哈利波特亲子魔术节目｜分幕动态演示</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;700&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#070711;
      --bg-soft:#121324;
      --panel:#101528cc;
      --panel-solid:#101528;
      --line:rgba(255,255,255,.12);
      --gold:#f3cf80;
      --gold-strong:#ffd66e;
      --blue:#7bc8ff;
      --pink:#ffc7ee;
      --green:#9cf1c7;
      --text:#f6f1e7;
      --muted:#c6bfd2;
      --shadow:0 24px 80px rgba(0,0,0,.45);
      --mom:#ffb37d;
      --kid:#7fc9ff;
      --crowd:#cfd3ef;
    }

    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;background:
      radial-gradient(circle at top,#2d205d 0%,rgba(45,32,93,.12) 24%,transparent 52%),
      radial-gradient(circle at 20% 20%,rgba(243,207,128,.14),transparent 24%),
      linear-gradient(180deg,#090913 0%,#06060d 100%);
      color:var(--text);
      font-family:"Noto Serif SC",serif}
    body{overflow:hidden}
    button,select{font:inherit}

    .shell{
      display:grid;
      grid-template-columns:260px 250px minmax(0,1fr);
      gap:18px;
      height:100vh;
      padding:18px;
    }

    .panel{
      background:var(--panel);
      border:1px solid var(--line);
      backdrop-filter:blur(18px);
      border-radius:28px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .sidebar,.stepbar{
      display:flex;
      flex-direction:column;
      min-height:0;
    }

    .brand,.step-head{
      padding:24px 24px 18px;
      border-bottom:1px solid var(--line);
      background:
        linear-gradient(180deg,rgba(255,255,255,.04),transparent),
        radial-gradient(circle at top left,rgba(243,207,128,.12),transparent 38%);
    }

    .eyebrow{
      font-size:12px;
      letter-spacing:.22em;
      text-transform:uppercase;
      color:var(--gold);
      opacity:.9;
    }

    h1,h2,h3,p{margin:0}
    h1,h2{font-family:"ZCOOL XiaoWei",serif;letter-spacing:.02em}
    .brand h1{font-size:28px;line-height:1.18;margin-top:10px}
    .brand p,.step-head p{margin-top:10px;color:var(--muted);line-height:1.7;font-size:14px}

    .scene-list{
      padding:14px;
      overflow:auto;
      display:grid;
      gap:10px;
    }

    .scene-btn{
      width:100%;
      text-align:left;
      border:1px solid transparent;
      background:rgba(255,255,255,.03);
      color:var(--text);
      border-radius:20px;
      padding:16px 16px 14px;
      cursor:pointer;
      transition:.24s ease;
    }
    .scene-btn:hover{transform:translateY(-2px);border-color:rgba(255,255,255,.14);background:rgba(255,255,255,.05)}
    .scene-btn.active{
      background:linear-gradient(135deg,rgba(243,207,128,.18),rgba(123,200,255,.12));
      border-color:rgba(243,207,128,.46);
      box-shadow:0 18px 40px rgba(0,0,0,.25);
    }
    .scene-btn small{display:block;color:var(--gold);margin-bottom:6px}
    .scene-btn strong{display:block;font-size:16px;line-height:1.45}
    .scene-btn span{display:block;margin-top:8px;color:var(--muted);font-size:13px;line-height:1.55}
    .tag-row{
      display:flex;
      flex-wrap:wrap;
      gap:6px;
      margin-top:10px;
    }
    .magic-tag{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:5px 10px;
      border-radius:999px;
      background:rgba(243,207,128,.12);
      border:1px solid rgba(243,207,128,.26);
      color:var(--gold);
      font-size:11px;
      line-height:1;
      white-space:nowrap;
    }

    .main{
      display:grid;
      grid-template-rows:auto minmax(0,1fr);
      min-height:0;
    }

    .hero{
      padding:16px 20px 14px;
      display:flex;
      justify-content:flex-start;
      gap:18px;
      align-items:center;
      border-bottom:1px solid var(--line);
      background:
        radial-gradient(circle at 50% 0%,rgba(255,214,110,.14),transparent 45%),
        linear-gradient(180deg,rgba(255,255,255,.03),transparent);
    }

    .hero h2{font-size:28px;line-height:1.15;margin-top:4px}

    .stage-wrap{
      display:grid;
      grid-template-rows:minmax(0,1fr) auto auto;
      min-height:0;
      padding:18px;
      gap:16px;
    }

    .stage{
      position:relative;
      overflow:hidden;
      border-radius:28px;
      border:1px solid rgba(255,255,255,.08);
      background:
        radial-gradient(circle at 50% 12%,rgba(255,239,171,.25),transparent 28%),
        linear-gradient(180deg,#2d143a 0%,#11142b 38%,#0f1020 60%,#1e1631 61%,#2c1d19 100%);
      min-height:420px;
    }
    .stage::before{
      content:"";
      position:absolute;
      inset:10px;
      border-radius:22px;
      border:1px solid rgba(255,255,255,.06);
      pointer-events:none;
    }
    .stage::after{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(90deg,rgba(0,0,0,.38) 0 2.6%,transparent 2.6% 97.4%,rgba(0,0,0,.38) 97.4% 100%),
        linear-gradient(180deg,rgba(255,255,255,.03),transparent 22%,transparent 78%,rgba(0,0,0,.18));
      pointer-events:none;
      mix-blend-mode:soft-light;
    }

    .curtain{
      position:absolute;
      inset:0 0 auto;
      height:44%;
      background:
        linear-gradient(90deg,rgba(0,0,0,.18) 0%,transparent 10%,rgba(0,0,0,.16) 20%,transparent 30%,rgba(0,0,0,.18) 40%,transparent 50%,rgba(0,0,0,.18) 60%,transparent 70%,rgba(0,0,0,.16) 80%,transparent 90%,rgba(0,0,0,.18) 100%),
        linear-gradient(180deg,rgba(112,11,40,.96),rgba(83,6,32,.9));
      opacity:.9;
      mask-image:linear-gradient(180deg,#000 0%,#000 78%,transparent 100%);
    }

    .spotlight,.spotlight.right{
      position:absolute;
      width:44%;
      height:90%;
      top:-38%;
      background:radial-gradient(circle at 50% 0%,rgba(255,239,171,.7),rgba(255,239,171,.24) 28%,transparent 70%);
      filter:blur(14px);
      opacity:.5;
      pointer-events:none;
      mix-blend-mode:screen;
    }
    .spotlight{left:11%;transform:rotate(16deg)}
    .spotlight.right{right:11%;transform:rotate(-16deg)}

    .stage-grid{
      position:absolute;
      inset:0;
      background:
        linear-gradient(transparent 72%,rgba(255,255,255,.04) 72%,rgba(255,255,255,.04) 73%,transparent 73%),
        linear-gradient(90deg,transparent 18%,rgba(255,255,255,.05) 18.2%,transparent 18.3%,transparent 50%,rgba(255,255,255,.05) 50.2%,transparent 50.3%,transparent 82%,rgba(255,255,255,.05) 82.2%,transparent 82.3%);
      opacity:.55;
      pointer-events:none;
    }

    .table-prop{
      position:absolute;
      left:86%;
      top:58%;
      width:90px;
      height:58px;
      border-radius:18px 18px 14px 14px;
      background:linear-gradient(180deg,#483220,#25170d);
      border:1px solid rgba(255,255,255,.12);
      box-shadow:0 18px 28px rgba(0,0,0,.35);
    }
    .table-prop::before{
      content:"";
      position:absolute;
      inset:10px 14px auto;
      height:8px;
      border-radius:999px;
      background:rgba(255,255,255,.08);
    }

    .actor{
      position:absolute;
      left:var(--x, 46%);
      top:var(--y, 61%);
      transform:translate(-50%,-100%);
      transition:left .95s cubic-bezier(.22,1,.36,1), top .95s cubic-bezier(.22,1,.36,1), filter .4s ease, opacity .4s ease;
      width:88px;
      height:140px;
      display:flex;
      align-items:flex-end;
      justify-content:center;
      pointer-events:none;
      z-index:3;
    }

    .actor .figure{
      width:72px;
      height:118px;
      position:relative;
      transform-origin:50% 100%;
      animation:float 2.8s ease-in-out infinite;
    }
    .actor.mom .figure{animation-duration:3.2s}

    .head{
      width:38px;
      height:38px;
      border-radius:50%;
      position:absolute;
      left:50%;
      top:0;
      transform:translateX(-50%);
      background:linear-gradient(180deg,#f9d2b4,#d99671);
      box-shadow:0 0 0 4px rgba(255,255,255,.06);
    }
    .body{
      position:absolute;
      left:50%;
      top:28px;
      width:62px;
      height:82px;
      transform:translateX(-50%);
      border-radius:20px 20px 14px 14px;
      border:1px solid rgba(255,255,255,.14);
    }
    .mom .body{background:linear-gradient(180deg,#4a2341,#18142d)}
    .kid .body{background:linear-gradient(180deg,#193665,#12162c)}

    .wand{
      position:absolute;
      width:28px;
      height:4px;
      border-radius:99px;
      right:-6px;
      top:56px;
      transform:rotate(-28deg);
      background:linear-gradient(90deg,#b47b31,#ffe4a2);
      box-shadow:0 0 14px rgba(255,214,110,.38);
      opacity:0;
      transition:.3s ease;
    }
    .actor.has-wand .wand{opacity:1}

    .name-tag{
      position:absolute;
      bottom:-2px;
      left:50%;
      transform:translateX(-50%);
      padding:4px 10px;
      border-radius:999px;
      font-size:12px;
      background:rgba(9,9,19,.76);
      border:1px solid rgba(255,255,255,.14);
      white-space:nowrap;
    }
    .mom .name-tag{color:var(--mom)}
    .kid .name-tag{color:var(--kid)}

    .actor.active .figure{filter:drop-shadow(0 0 24px rgba(255,214,110,.5))}

    .speech{
      position:absolute;
      left:var(--speech-x,50%);
      top:var(--speech-y,42%);
      transform:translate(var(--speech-tx,-50%),var(--speech-ty,-100%));
      width:min(320px,calc(100% - 84px));
      min-width:220px;
      padding:14px 16px;
      border-radius:18px;
      background:rgba(8,11,23,.92);
      border:1px solid rgba(255,255,255,.12);
      box-shadow:0 16px 36px rgba(0,0,0,.35);
      backdrop-filter:blur(12px);
      transition:all .45s ease;
      z-index:6;
    }
    .speech::after{
      content:"";
      position:absolute;
      width:14px;
      height:14px;
      bottom:-8px;
      background:rgba(8,11,23,.92);
      border-right:1px solid rgba(255,255,255,.12);
      border-bottom:1px solid rgba(255,255,255,.12);
      transform:rotate(45deg);
    }
    .speech.anchor-left::after{left:24px}
    .speech.anchor-center::after{left:50%;transform:translateX(-50%) rotate(45deg)}
    .speech.anchor-right::after{right:24px}
    .speech.mom{border-color:rgba(255,179,125,.32)}
    .speech.kid{border-color:rgba(127,201,255,.34)}
    .speech.crowd{border-color:rgba(207,211,239,.28)}
    .speech-action{
      margin-bottom:10px;
      padding:8px 10px;
      border-radius:12px;
      background:rgba(255,255,255,.05);
      color:var(--muted);
      font-size:12px;
      line-height:1.55;
    }
    .speech-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-bottom:10px;
      font-size:13px;
      color:var(--muted);
    }
    .speech-head strong{font-size:15px}
    .speech ul{margin:0;padding-left:1.2em;display:grid;gap:8px;line-height:1.7}

    .magic-ring{
      position:absolute;
      left:50%;
      top:52%;
      width:220px;
      height:220px;
      transform:translate(-50%,-50%) scale(.7);
      border-radius:50%;
      border:1px solid rgba(255,214,110,.55);
      box-shadow:0 0 0 16px rgba(255,214,110,.04),0 0 60px rgba(255,214,110,.18);
      opacity:0;
      pointer-events:none;
    }
    .stage.magic-on .magic-ring{animation:ring 1.05s ease}

    .sparkles{
      position:absolute;
      inset:0;
      pointer-events:none;
      opacity:0;
    }
    .stage.magic-on .sparkles{opacity:1}
    .sparkles span{
      position:absolute;
      width:7px;
      height:7px;
      border-radius:50%;
      background:radial-gradient(circle,#fff7dc 0%,#ffd66e 62%,transparent 72%);
      box-shadow:0 0 18px rgba(255,214,110,.55);
      animation:spark 1s ease forwards;
    }

    .prop-bar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      padding:0 2px;
    }
    .prop-chip{
      border-radius:999px;
      padding:10px 12px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.12);
      font-size:13px;
      color:var(--muted);
    }
    .prop-chip.active{
      color:#101528;
      background:linear-gradient(135deg,var(--gold-strong),#fff1b9);
      border-color:transparent;
      box-shadow:0 12px 24px rgba(255,214,110,.22);
    }

    .control-row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      flex-wrap:wrap;
    }

    .controls{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    .controls button{
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.05);
      color:var(--text);
      padding:12px 16px;
      border-radius:999px;
      cursor:pointer;
      transition:.2s ease;
    }
    .controls button.primary{
      background:linear-gradient(135deg,#ffe4a5,#f3cf80);
      color:#1f1407;
      border-color:transparent;
      font-weight:700;
    }
    .controls button:hover{transform:translateY(-1px)}

    .step-tree{
      position:relative;
      padding:14px 14px 18px 14px;
      overflow:auto;
      display:grid;
      gap:8px;
    }
    .step-tree::before{
      content:"";
      position:absolute;
      left:30px;
      top:20px;
      bottom:20px;
      width:1px;
      background:linear-gradient(180deg,rgba(255,255,255,.14),rgba(255,255,255,.03));
      pointer-events:none;
    }
    .beat-track{
      display:grid;
      gap:8px;
    }
    .beat-dot{
      position:relative;
      border:1px solid rgba(255,255,255,.1);
      border-radius:18px;
      background:rgba(255,255,255,.04);
      color:var(--muted);
      text-align:left;
      padding:12px 14px 12px 44px;
      cursor:pointer;
      transition:.22s ease;
    }
    .beat-dot::before{
      content:"";
      position:absolute;
      left:11px;
      top:18px;
      width:10px;
      height:10px;
      border-radius:50%;
      background:rgba(255,255,255,.2);
      box-shadow:0 0 0 4px rgba(255,255,255,.04);
    }
    .beat-dot::after{
      content:"";
      position:absolute;
      left:21px;
      top:22px;
      width:14px;
      height:1px;
      background:rgba(255,255,255,.14);
    }
    .beat-dot strong{display:block;color:var(--text);margin-bottom:4px;font-size:14px;line-height:1.45}
    .beat-dot span{display:block;font-size:12px;line-height:1.55}
    .beat-dot .magic-tag{
      margin-top:8px;
      background:rgba(123,200,255,.1);
      border-color:rgba(123,200,255,.24);
      color:var(--blue);
    }
    .beat-dot.active{
      border-color:rgba(243,207,128,.46);
      background:linear-gradient(135deg,rgba(243,207,128,.18),rgba(255,255,255,.06));
      color:var(--text);
      transform:translateX(4px);
    }
    .beat-dot.active::before{
      background:var(--gold);
      box-shadow:0 0 0 4px rgba(243,207,128,.12),0 0 18px rgba(243,207,128,.36);
    }

    .info-card{
      border:1px solid var(--line);
      border-radius:22px;
      padding:16px;
      background:rgba(255,255,255,.03);
    }
    .info-card h3{
      font-size:16px;
      margin-bottom:10px;
      color:var(--gold);
    }
    .info-card p,.info-card li{color:var(--muted);line-height:1.8}
    .info-card ul{margin:0;padding-left:1.15em}
    .keyline{
      display:grid;
      gap:10px;
      grid-template-columns:1fr;
    }
    .mini{
      padding:10px 12px;
      border-radius:14px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.08);
    }
    .mini strong{display:block;color:var(--text);font-size:13px;margin-bottom:6px}
    .mini span{color:var(--muted);font-size:13px;line-height:1.6}

    .stage-footer{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:12px;
    }
    .stage-note{
      padding:14px 16px;
      border-radius:18px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.1);
    }
    .stage-note strong{
      display:block;
      margin-bottom:6px;
      color:var(--gold);
      font-size:13px;
    }
    .stage-note span{
      color:var(--muted);
      font-size:13px;
      line-height:1.7;
    }

    @keyframes float{
      0%,100%{transform:translateY(0)}
      50%{transform:translateY(-5px)}
    }
    @keyframes ring{
      0%{opacity:0;transform:translate(-50%,-50%) scale(.65)}
      20%{opacity:1}
      100%{opacity:0;transform:translate(-50%,-50%) scale(1.18)}
    }
    @keyframes spark{
      0%{transform:translateY(0) scale(.6);opacity:0}
      20%{opacity:1}
      100%{transform:translateY(-36px) scale(1.1);opacity:0}
    }

    @media (max-width:1200px){
      body{overflow:auto}
      .shell{
        height:auto;
        min-height:100vh;
        grid-template-columns:1fr;
      }
      .sidebar,.stepbar,.main{min-height:auto}
      .stage{min-height:380px}
    }

    @media (max-width:720px){
      .shell{padding:12px;gap:12px}
      .brand,.step-head,.hero{padding:18px}
      .hero h2{font-size:24px}
      .stage-wrap{padding:12px}
      .stage{min-height:320px}
      .speech{
        width:min(300px,calc(100% - 36px));
        min-width:0;
      }
      .beat-track{grid-template-columns:1fr}
      .step-tree::before{display:none}
      .beat-dot{padding-left:14px}
      .beat-dot::before,.beat-dot::after{display:none}
      .stage-footer{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="panel sidebar">
      <div class="brand">
        <div class="eyebrow">Stage Animation</div>
        <h1>分幕动态演示</h1>
        <p>不是静态台本，而是把每一幕拆成可以播放的分镜：谁走位、谁接话、哪一步变魔术，都会在舞台里动态演出来。</p>
      </div>
      <div class="scene-list" id="scene-list"></div>
    </aside>

    <aside class="panel stepbar">
      <div class="step-head">
        <div class="eyebrow">Steps</div>
        <h2 id="beat-title">第 1 步</h2>
      </div>
      <div class="step-tree">
        <div class="beat-track" id="beat-track"></div>
      </div>
    </aside>

    <main class="panel main">
      <section class="hero">
        <div>
          <div class="eyebrow" id="scene-act">第一幕</div>
          <h2 id="scene-title">教授登场</h2>
        </div>
      </section>

      <section class="stage-wrap">
        <div class="stage" id="stage">
          <div class="curtain"></div>
          <div class="spotlight"></div>
          <div class="spotlight right"></div>
          <div class="stage-grid"></div>
          <div class="table-prop"></div>
          <div class="magic-ring"></div>
          <div class="sparkles" id="sparkles"></div>

          <div class="actor mom" id="actor-mom">
            <div class="figure">
              <div class="head"></div>
              <div class="body"></div>
              <div class="wand"></div>
            </div>
            <div class="name-tag">妈妈</div>
          </div>

          <div class="actor kid" id="actor-kid">
            <div class="figure">
              <div class="head"></div>
              <div class="body"></div>
              <div class="wand"></div>
            </div>
            <div class="name-tag">弟弟</div>
          </div>

          <div class="speech mom" id="speech">
            <div class="speech-head">
              <strong id="speech-speaker"></strong>
              <span id="speech-kind"></span>
            </div>
            <div class="speech-action" id="speech-action"></div>
            <ul id="speech-lines"></ul>
          </div>
        </div>

        <div class="control-row">
          <div class="controls">
            <button id="prev-btn">上一步</button>
            <button id="play-btn" class="primary">自动播放</button>
            <button id="next-btn">下一步</button>
            <button id="reset-btn">回到本幕开头</button>
          </div>
          <div class="prop-bar" id="prop-bar"></div>
        </div>
        <div class="stage-footer">
          <div class="stage-note">
            <strong>舞台提示</strong>
            <span id="detail-staging"></span>
          </div>
          <div class="stage-note">
            <strong>提醒</strong>
            <span id="detail-prep"></span>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script>
    const POSITIONS = {
      offLeft: { x: 4, y: 60 },
      left: { x: 12, y: 60 },
      leftFront: { x: 12, y: 72 },
      centerLeft: { x: 32, y: 60 },

          { speaker: "弟弟", kind: "情景对话", expression: "真诚、开心", action: "弟弟先看妈妈，再转头看台下，真的把第四堵墙打破。", lines: ["（真诚）跟同学们在一起，每天都过得很开心。", "（慢一点）这就是我学到的，最好的魔法。"], prep: "一定要看向观众，不只看妈妈。", staging: "弟弟站中心前沿，视线从右侧的妈妈转向观众。", positions: { mom: "right", kid: "centerFront" }, propsActive: ["弟弟魔杖"], wand: { kid: true } },
          { speaker: "弟弟", kind: "情景对话", expression: "带一点得意，也带一点神秘", action: "弟弟扬一下手里的魔杖，告诉大家自己还有最后一个魔法。", lines: ["（神秘）不过，我还有最后一个魔法。", "（开心）这个魔法，是送给大家的。"], prep: "说完后妈妈再递礼物袋。", staging: "弟弟中心前沿继续控场，妈妈留右准备递袋。", positions: { mom: "right", kid: "centerFront" }, propsActive: ["弟弟魔杖"], wand: { kid: true } },
          { speaker: "弟弟", kind: "魔法呈现", expression: "认真施法，礼物出来时自然惊喜", action: "妈妈递上礼物袋后退半步，弟弟展示空袋，再变出礼物送给大家。", lines: ["（认真展示）这个礼物袋里，现在也是空的。", "（施法）最后一个魔法，现在开始。", "（开心）我要把礼物送给大家。", "（惊喜）真的变出来了！"], prep: "展示空袋和出礼物都要清楚。", staging: "弟弟中心前沿施法，妈妈退回右侧，把舞台完整让出来。", positions: { mom: "right", kid: "centerFront" }, propsActive: ["礼物袋", "礼物", "弟弟魔杖"], magic: true, magicLabel: "空袋出礼物", wand: { kid: true } },
          { speaker: "妈妈", kind: "情景对话", expression: "温柔、郑重、带祝福", action: "妈妈等弟弟完成送礼后上前并肩站好，一起看向台下。", lines: ["（郑重温馨）也祝愿在座台下的所有小魔法师们，都能带着这三年学会的魔法，在新的地方继续加油，学习新的本领，勇敢地走向更大的世界。"], prep: "礼物和祝福同时落下，弟弟不再承担长段抒情。", staging: "妈妈从右侧上前，和弟弟并肩站在舞台前沿，一起收口。", positions: { mom: "centerRight", kid: "centerLeft" }, propsActive: ["礼物"] }
        ]
      }
    ];

    const state = { sceneIndex: 0, beatIndex: 0, playing: false, timer: null };

    const sceneList = document.getElementById("scene-list");
    const sceneAct = document.getElementById("scene-act");
    const sceneTitle = document.getElementById("scene-title");
    const beatTrack = document.getElementById("beat-track");
    const propBar = document.getElementById("prop-bar");
    const stage = document.getElementById("stage");
    const sparkles = document.getElementById("sparkles");
    const speech = document.getElementById("speech");
    const speechSpeaker = document.getElementById("speech-speaker");
    const speechKind = document.getElementById("speech-kind");
    const speechLines = document.getElementById("speech-lines");
    const actorMom = document.getElementById("actor-mom");
    const actorKid = document.getElementById("actor-kid");
    const beatTitle = document.getElementById("beat-title");
    const detailStaging = document.getElementById("detail-staging");
    const detailPrep = document.getElementById("detail-prep");
    const speechAction = document.getElementById("speech-action");
    const playBtn = document.getElementById("play-btn");

    function renderSceneList(){
      sceneList.innerHTML = scenes.map((scene, index) => `
        <button class="scene-btn ${index === state.sceneIndex ? "active" : ""}" data-scene="${index}">
          <small>${scene.act}</small>
          <strong>${scene.title}</strong>
          <span>${scene.summary}</span>
          ${scene.magicTags?.length ? `<div class="tag-row">${scene.magicTags.map(tag => `<span class="magic-tag">${tag}</span>`).join("")}</div>` : ""}
        </button>
      `).join("");
      sceneList.querySelectorAll(".scene-btn").forEach(btn => {
        btn.addEventListener("click", () => selectScene(Number(btn.dataset.scene)));
      });
    }

    function placeActor(el, posName){
      const pos = POSITIONS[posName] || POSITIONS.center;
      el.style.setProperty("--x", `${pos.x}%`);
      el.style.setProperty("--y", `${pos.y}%`);
    }

    function renderSparkles(){
      sparkles.innerHTML = Array.from({ length: 14 }).map((_, index) => {
        const left = 24 + (index % 7) * 9 + (index % 2 ? 4 : 0);
        const top = 28 + Math.floor(index / 7) * 16;
        const delay = (index * 0.05).toFixed(2);
        return `<span style="left:${left}%;top:${top}%;animation-delay:${delay}s"></span>`;
      }).join("");
    }

    function sceneCurrent(){
      return scenes[state.sceneIndex];
    }

    function beatCurrent(){
      return sceneCurrent().beats[state.beatIndex];
    }

    function renderHero(){
      const scene = sceneCurrent();
      sceneAct.textContent = scene.act;
      sceneTitle.textContent = scene.title;
    }

    function renderBeatTrack(){
      const scene = sceneCurrent();
      beatTrack.innerHTML = scene.beats.map((beat, index) => `
        <button class="beat-dot ${index === state.beatIndex ? "active" : ""}" data-beat="${index}">
          <strong>第 ${index + 1} 步｜${beat.speaker}</strong>
          <span>${beat.kind} · ${beat.action}</span>
          ${beat.magicLabel ? `<span class="magic-tag">${beat.magicLabel}</span>` : ""}
        </button>
      `).join("");
      beatTrack.querySelectorAll(".beat-dot").forEach(btn => {
        btn.addEventListener("click", () => {
          state.beatIndex = Number(btn.dataset.beat);
          stopAutoPlay();
          renderAll();
        });
      });
    }

    function renderProps(){
      const scene = sceneCurrent();
      const active = new Set(beatCurrent().propsActive || []);
      propBar.innerHTML = scene.props.map(name => `
        <span class="prop-chip ${active.has(name) ? "active" : ""}">${name}</span>
      `).join("");
    }

    function renderStage(){
      const beat = beatCurrent();
      placeActor(actorMom, beat.positions.mom);
      placeActor(actorKid, beat.positions.kid);

      actorMom.classList.toggle("active", beat.speaker === "妈妈");
      actorKid.classList.toggle("active", beat.speaker === "弟弟");
      actorMom.classList.toggle("has-wand", !!(beat.wand && beat.wand.mom));
      actorKid.classList.toggle("has-wand", !!(beat.wand && beat.wand.kid));

      const anchorPosName = beat.speaker === "妈妈"
        ? beat.positions.mom
        : beat.speaker === "弟弟"
          ? beat.positions.kid
          : "center";
      const anchorPos = POSITIONS[anchorPosName] || POSITIONS.center;
      const bubbleY = Math.max(24, anchorPos.y - 24);
      let anchorClass = "anchor-center";
      let bubbleX = anchorPos.x;
      let tx = "-50%";
      if (beat.speaker === "全场") {
        bubbleX = 50;
      } else if (anchorPos.x >= 66) {
        anchorClass = "anchor-right";
        bubbleX = anchorPos.x - 4;
        tx = "-100%";
      } else if (anchorPos.x <= 26) {
        anchorClass = "anchor-left";
        bubbleX = anchorPos.x + 4;
        tx = "0";
      }

      speech.className = `speech ${beat.speaker === "妈妈" ? "mom" : beat.speaker === "弟弟" ? "kid" : "crowd"} ${anchorClass}`;
      speech.style.setProperty("--speech-x", `${bubbleX}%`);
      speech.style.setProperty("--speech-y", `${bubbleY}%`);
      speech.style.setProperty("--speech-tx", tx);
      speech.style.setProperty("--speech-ty", "-100%");
      speechSpeaker.textContent = beat.speaker;
      speechKind.textContent = beat.kind;
      speechAction.textContent = `动作：${beat.action}`;
      speechLines.innerHTML = beat.lines.map(line => `<li>${line}</li>`).join("");

      stage.classList.remove("magic-on");
      if (beat.magic) {
        void stage.offsetWidth;
        stage.classList.add("magic-on");
      }
    }

    function renderDetails(){
      const beat = beatCurrent();
      beatTitle.textContent = `第 ${state.beatIndex + 1} 步`;
      detailStaging.textContent = beat.staging;
      detailPrep.textContent = beat.prep;
    }

    function renderAll(){
      renderSceneList();
      renderHero();
      renderBeatTrack();
      renderProps();
      renderStage();
      renderDetails();
      playBtn.textContent = state.playing ? "暂停播放" : "自动播放";
    }

    function selectScene(index){
      state.sceneIndex = index;
      state.beatIndex = 0;
      stopAutoPlay();
      renderAll();
    }

    function goBeat(step){
      const scene = sceneCurrent();
      state.beatIndex = Math.max(0, Math.min(scene.beats.length - 1, state.beatIndex + step));
      renderAll();
    }

    function stopAutoPlay(){
      state.playing = false;
      window.clearTimeout(state.timer);
      state.timer = null;
    }

    function autoPlayNext(){
      const scene = sceneCurrent();
      if (!state.playing) return;
      if (state.beatIndex >= scene.beats.length - 1) {
        stopAutoPlay();
        renderAll();
        return;
      }
      state.beatIndex += 1;
      renderAll();
      state.timer = window.setTimeout(autoPlayNext, beatCurrent().magic ? 2600 : 3200);
    }

    document.getElementById("prev-btn").addEventListener("click", () => {
      stopAutoPlay();
      goBeat(-1);
    });
    document.getElementById("next-btn").addEventListener("click", () => {
      stopAutoPlay();
      goBeat(1);
    });
    document.getElementById("reset-btn").addEventListener("click", () => {
      state.beatIndex = 0;
      stopAutoPlay();
      renderAll();
    });
    playBtn.addEventListener("click", () => {
      if (state.playing) {
        stopAutoPlay();
        renderAll();
        return;
      }
      state.playing = true;
      renderAll();
      window.clearTimeout(state.timer);
      state.timer = window.setTimeout(autoPlayNext, beatCurrent().magic ? 2600 : 3200);
    });

    renderSparkles();
    renderAll();
  </script>
</body>
</html>
