<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>幼儿园毕业典礼哈利波特主题亲子魔术节目执行页</title>
  <style>
    :root{--bg:#0b1020;--bg2:#11182e;--panel:rgba(255,255,255,.06);--line:rgba(255,255,255,.08);--text:#f7f0df;--muted:#cfc2a7;--gold:#ffd57d;--blue:#97b7ff;--green:#8de2ae;--orange:#ffc293;--gray:#c3cad9;--danger:#ffb5b5;--shadow:0 20px 50px rgba(0,0,0,.35);--r1:28px;--r2:20px;--r3:14px;--max:1280px}
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Segoe UI","Noto Sans SC",sans-serif;color:var(--text);background:radial-gradient(circle at top left,rgba(123,164,255,.18),transparent 26%),radial-gradient(circle at top right,rgba(255,213,125,.15),transparent 24%),linear-gradient(180deg,#09101e,#10172c 45%,#0b1020);min-height:100vh}
    body::before{content:"";position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.018) 1px,transparent 1px);background-size:42px 42px;mask-image:linear-gradient(180deg,rgba(0,0,0,.55),transparent 92%)}
    button,input,select{font:inherit}
    button{cursor:pointer}
    .page{max-width:var(--max);margin:0 auto;padding:24px}
    .hero,.panel,.scene-card,.accordion,.material-card{border:1px solid var(--line);border-radius:var(--r1);background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.03));box-shadow:var(--shadow)}
    .hero{padding:32px;overflow:hidden;position:relative}
    .hero::after{content:"";position:absolute;width:240px;height:240px;right:-60px;bottom:-100px;border-radius:50%;background:radial-gradient(circle,rgba(123,164,255,.28),transparent 68%)}
    .eyebrow{display:inline-flex;gap:8px;align-items:center;padding:8px 12px;border-radius:999px;background:rgba(255,213,125,.11);border:1px solid rgba(255,213,125,.18);color:var(--gold);font-size:12px;letter-spacing:.08em;text-transform:uppercase}
    h1{margin:16px 0 12px;font-size:clamp(30px,4.2vw,52px);line-height:1.15}
    .hero p{margin:0;max-width:840px;color:var(--muted);line-height:1.85}
    .hero-facts{display:flex;flex-wrap:wrap;gap:10px;margin-top:18px}
    .tabs{position:sticky;top:12px;z-index:20;margin-top:18px;padding:12px;border-radius:22px;border:1px solid rgba(255,255,255,.1);background:rgba(8,12,24,.9);backdrop-filter:blur(16px);box-shadow:var(--shadow)}
    .tab-list{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;scrollbar-width:none}
    .tab-list::-webkit-scrollbar{display:none}
    .tab-btn{padding:14px 16px;border-radius:16px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:var(--muted);white-space:nowrap;font-weight:700}
    .tab-btn.active{background:linear-gradient(135deg,#ffd57d,#dfa74f);color:#241807;font-weight:800;border-color:rgba(255,213,125,.38);box-shadow:inset 0 0 0 1px rgba(255,255,255,.15)}
    .tab-panel{display:none;margin-top:18px;flex-direction:column;gap:18px}
    .tab-panel.active{display:flex}
    .panel{padding:24px}
    .head{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;margin-bottom:18px}
    .head h2{margin:0;font-size:clamp(24px,2.5vw,34px)}
    .head p{margin:8px 0 0;color:var(--muted);line-height:1.8;font-size:14px;max-width:760px}
    .actions{display:flex;flex-wrap:wrap;gap:10px}
    .chip-btn,.ghost{padding:10px 14px;border-radius:999px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.05);color:var(--text)}
    .chip-btn.active{background:rgba(255,213,125,.12);border-color:rgba(255,213,125,.26);color:var(--gold)}
    .jump-list,.material-summary,.material-grid{display:grid;gap:14px}
    .jump-list{grid-template-columns:repeat(3,minmax(0,1fr))}
    .material-summary{grid-template-columns:repeat(4,minmax(0,1fr))}
    .jump{padding:16px;border-radius:18px;text-align:left;border:1px solid rgba(255,255,255,.08);background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.03));color:var(--text)}
    .jump.active{border-color:rgba(255,213,125,.3);background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.04))}
    .jump small{display:block;color:var(--gold);font-size:12px;letter-spacing:.12em;text-transform:uppercase}
    .jump strong{display:block;margin-top:8px;font-size:18px;line-height:1.45}
    .jump span{display:block;margin-top:10px;color:var(--muted);font-size:13px;line-height:1.75}
    .stack{display:flex;flex-direction:column;gap:16px}
    .scene-card{overflow:hidden}
    .scene-card[open]{border-color:rgba(255,213,125,.28)}
    .scene-card>summary{list-style:none;padding:22px 24px;cursor:pointer;display:flex;justify-content:space-between;gap:16px;background:linear-gradient(180deg,rgba(255,255,255,.055),rgba(255,255,255,.03)),radial-gradient(circle at top right,rgba(123,164,255,.16),transparent 42%)}
    .scene-card>summary::-webkit-details-marker,.accordion>summary::-webkit-details-marker{display:none}
    .scene-main small{display:block;color:var(--gold);font-size:12px;letter-spacing:.14em;text-transform:uppercase}
    .scene-main h3{margin:8px 0 0;font-size:clamp(22px,2.3vw,30px);line-height:1.35}
    .scene-main p{margin:10px 0 0;color:var(--muted);line-height:1.8;font-size:14px}
    .scene-tags{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}
    .tag{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;font-size:12px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.05)}
    .tag.gold{color:var(--gold);background:rgba(255,213,125,.1);border-color:rgba(255,213,125,.18)}
    .tag.green{color:var(--green);background:rgba(141,226,174,.1);border-color:rgba(141,226,174,.18)}
    .scene-body{padding:0 24px 24px}
    .scene-meta{display:grid;grid-template-columns:minmax(0,1fr);gap:16px;margin-bottom:16px}
    .info{padding:18px;border-radius:18px;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.04)}
    .info h4{margin:0 0 10px;color:var(--gold);font-size:14px}
    .info p,.info ul{margin:0;color:var(--muted);font-size:14px;line-height:1.85}
    .info ul{padding-left:18px}
    .beat-list{display:flex;flex-direction:column;gap:12px}
    .beat{display:grid;grid-template-columns:142px minmax(0,1fr);border-radius:18px;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.04);overflow:hidden}
    .beat.magic{border-color:rgba(141,226,174,.22)}
    .speaker-panel{padding:14px 14px;border-right:1px solid rgba(255,255,255,.08);display:flex;align-items:flex-start}
    .speaker-panel.mom{background:linear-gradient(180deg,rgba(255,194,147,.22),rgba(255,194,147,.08))}
    .speaker-panel.kid{background:linear-gradient(180deg,rgba(151,183,255,.22),rgba(151,183,255,.08))}
    .speaker-panel.crowd{background:linear-gradient(180deg,rgba(195,202,217,.18),rgba(195,202,217,.07))}
    .speaker-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:13px;line-height:1.45}
    .speaker-role{font-size:18px;font-weight:800;line-height:1.2}
    .speaker-type{display:inline-flex;align-self:flex-start;padding:5px 8px;border-radius:999px;font-size:11px;font-weight:700;border:1px solid rgba(255,255,255,.12)}
    .speaker-type.dialogue{background:rgba(255,213,125,.12);color:var(--gold)}
    .speaker-type.magic{background:rgba(141,226,174,.12);color:var(--green)}
    .speaker-index{font-size:12px;color:rgba(247,240,223,.72)}
    .beat-content{padding:14px}
    .beat-grid{display:grid;grid-template-columns:minmax(0,1fr) 230px;gap:14px}
    .quote{padding:10px 12px;border-left:3px solid rgba(255,213,125,.58);border-radius:0 12px 12px 0;background:rgba(255,255,255,.03);margin-bottom:8px}
    .quote strong{display:block;color:var(--gold);font-size:12px;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
    .quote div{line-height:1.8;font-size:14px}
    .dialogue-box{padding:12px;border-radius:14px;background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.05)}
    .dialogue-box strong{display:block;color:var(--text);font-size:13px;letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px}
    .lines{margin:0;padding-left:18px;display:grid;gap:6px;font-size:14px;line-height:1.76}
    .prep{padding:12px;border-radius:14px;border:1px solid rgba(255,255,255,.06);background:rgba(8,12,24,.45)}
    .prep strong{display:block;color:var(--gold);font-size:12px;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
    .prep div{color:var(--muted);font-size:13px;line-height:1.8}
    .accordion{overflow:hidden}
    .accordion[open]{border-color:rgba(255,213,125,.24)}
    .accordion>summary{list-style:none;padding:18px 20px;cursor:pointer;display:flex;justify-content:space-between;gap:14px}
    .accordion h3{margin:0;font-size:18px}
    .accordion p{margin:6px 0 0;color:var(--muted);font-size:13px;line-height:1.75}
    .accordion .body{padding:0 20px 20px}
    .accordion ul{margin:0;padding-left:18px;color:var(--muted);display:grid;gap:10px;line-height:1.85;font-size:14px}
    .toolbar{display:grid;grid-template-columns:minmax(0,1.1fr) 220px 220px;gap:12px;margin-bottom:18px}
    .field{width:100%;padding:12px 14px;border-radius:14px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:var(--text);outline:none}
    .field::placeholder{color:rgba(207,194,167,.85)}
    .material-grid{grid-template-columns:repeat(3,minmax(0,1fr))}
    .material-card{padding:18px;display:flex;flex-direction:column;gap:12px}
    .material-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
    .material-card h3{margin:0;font-size:18px;line-height:1.42}
    .meta{display:flex;gap:8px;flex-wrap:wrap}
    .material-card p{margin:0;color:var(--muted);font-size:14px;line-height:1.8}
    .empty{padding:26px;border-radius:18px;border:1px dashed rgba(255,255,255,.12);text-align:center;color:var(--muted);line-height:1.8}
    @media (max-width:1100px){
      .material-summary,.jump-list,.material-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
      .scene-meta,.beat-grid,.toolbar{grid-template-columns:1fr}
      .head{flex-direction:column;align-items:stretch}
      .actions{justify-content:flex-start}
    }
    @media (max-width:720px){
      .page{padding:16px}
      .hero,.panel{padding:20px;border-radius:22px}
      .tab-list{grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
      .tab-btn{padding:10px 8px;font-size:12px;border-radius:12px}
      .material-summary,.jump-list,.material-grid{grid-template-columns:1fr}
      .scene-card>summary,.material-top,.beat{flex-direction:column;align-items:stretch}
      .beat{display:flex}
      .speaker-panel{border-right:none;border-bottom:1px solid rgba(255,255,255,.08)}
      .scene-tags{justify-content:flex-start}
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="hero">
      <div class="eyebrow">哈利波特主题亲子魔术节目</div>
      <h1>幼儿园毕业典礼完整执行台本</h1>
      <p>双人版，约 5 分钟。</p>
      <div class="hero-facts">
        <span class="tag gold">妈妈 + 弟弟</span>
        <span class="tag">6 幕</span>
        <span class="tag green">含魔法呈现段</span>
      </div>
    </section>

    <nav class="tabs">
      <div class="tab-list">
        <button class="tab-btn active" data-tab="background">节目背景</button>
        <button class="tab-btn" data-tab="script">剧本执行</button>
        <button class="tab-btn" data-tab="materials">材料准备</button>
      </div>
    </nav>

    <section class="tab-panel" id="tab-script">
      <section class="panel">
        <div class="head">
          <div>
            <h2>剧本执行</h2>
            <p>按幕查看剧情和排练内容。每条都拆开成动作、表情、台词和提醒。</p>
          </div>
          <div class="actions">
            <button class="ghost" id="expand-all">展开全部幕次</button>
            <button class="ghost" id="collapse-all">收起全部幕次</button>
            <button class="chip-btn active" data-kind="all">全部内容</button>
            <button class="chip-btn" data-kind="dialogue">只看情景对白</button>
            <button class="chip-btn" data-kind="magic">只看魔法呈现</button>
            <button class="chip-btn active" data-speaker="all">全部人物</button>
            <button class="chip-btn" data-speaker="妈妈">妈妈</button>
            <button class="chip-btn" data-speaker="弟弟">弟弟</button>
            <button class="chip-btn" data-speaker="全场">全场</button>
          </div>
        </div>
        <div class="jump-list" id="jump-list"></div>
      </section>

      <div class="stack" id="scene-list"></div>
    </section>

    <section class="tab-panel active" id="tab-background">
      <section class="panel">
        <div class="head">
          <div>
            <h2>节目背景</h2>
            <p>这一部分保留剧情背景、角色定位、站位和排练提醒，方便先了解节目，再切到剧本执行。</p>
          </div>
        </div>
        <div id="background-list"></div>
      </section>
    </section>

    <section class="tab-panel" id="tab-materials">
      <section class="panel">
        <div class="head">
          <div>
            <h2>材料准备总清单</h2>
            <p>每个物品单独一张卡，支持按名称、类别和对应幕次筛选。适合边采购边核对，也适合移动端现场检查。</p>
          </div>
        </div>
        <div class="material-summary" id="material-summary"></div>
        <div class="toolbar">
          <input class="field" id="search-input" placeholder="搜索物料名称、用途或准备要点">
          <select class="field" id="scene-filter"></select>
          <select class="field" id="category-filter"></select>
        </div>
        <div class="material-grid" id="material-grid"></div>
      </section>
    </section>

  </div>

  <script>
    const data = {
      background: [
        { title: "节目背景", summary: "哈利波特主题亲子剧情魔术，核心是把“入学考验 → 学会魔法 → 分院 → 毕业祝福”讲完整。", bullets: ["妈妈扮演霍格沃茨教授兼串场主持，弟弟扮演接受考验的新生小巫师。", "节目不是把几个魔术拼在一起，而是用魔术推动剧情。", "最后要自然落回毕业典礼主题，而不是停在“我会魔法了”。"] },
        { title: "角色定位", summary: "排练时先把职责分开，妈妈不断话，弟弟不断动作。", bullets: ["妈妈：开场立住角色、发问、递道具、收道具、带互动和收尾点题。", "弟弟：完成所有关键变化，从接受考验一路成长到学会魔法。", "全场 / 观众：只在分院那一幕参与口令互动，不承担复杂配合。"] },
        { title: "舞台站位", summary: "站位和道具摆放决定这场戏会不会顺。", bullets: ["舞台中心留给弟弟，作为主要呈现点。", "妈妈默认站在弟弟侧后方半步，既能递话，也能接道具。", "桌子放在舞台一侧，所有道具按幕次从左到右摆放。", "如果现场不能放桌子，就改成分幕收纳篮，但顺序仍然按幕次走。"] },
        { title: "开场前最后 30 秒", summary: "上场前只盯关键项，避免临场信息过多。", bullets: ["妈妈确认：音乐、伸缩魔杖、空盒、纸袋、书、分院帽、信封、开花道具、礼物袋都在正确位置。", "弟弟只检查 3 件事：袍子顺不顺、自己的魔杖在不在、第一句台词记不记得。", "如果孩子紧张，妈妈只重复一句：你只要看着我，听我的话，做你练过的动作就可以。"] },
        { title: "彩排时只盯这几件事", summary: "这是最容易出错、也最值得反复排的节点。", bullets: ["第一幕最重要的是妈妈开场空手施法拿魔杖一定要稳。", "第二幕空盒结束后，妈妈必须立刻收走空盒和物品。", "第二幕纸袋开花后，纸袋和花盒也要马上由妈妈接走。", "第三幕一定加上“魔杖点书”的互动动作。", "第四幕必须真的把分院帽拿出来、戴上、再从帽里拿结果。", "第五幕默认沿用第二幕的同一根魔杖，不再额外换杖。", "第六幕由妈妈先点题毕业，再由弟弟送礼物。"] }
      ],
      scenes: [
        { id: "s1", act: "第一幕", title: "教授登场，迎接新生 + 妈妈空手施法拿出魔杖", duration: "约 40 秒", objective: "先立住“教授”和“新生考验”的世界观，同时让妈妈先用一个干净的施法动作把角色身份做出来。", summary: "开场先讲设定，再马上给出第一个魔法动作，让观众知道这是一场有剧情的入学考验。", beats: [
          { kind: "dialogue", speaker: "妈妈", action: "音乐起后稳稳上场，步子不要急，先看弟弟，再看观众。", expression: "庄重、带一点仪式感。", lines: ["（慷慨激昂）欢迎来到霍格沃茨。", "（沉稳）我是今天负责新生考验的教授。"], prep: "伸缩魔杖提前藏好。第一句台词后立刻接施法。" },
          { kind: "magic", speaker: "妈妈", action: "右手抬起，做一个教授施法前的聚气动作，再自然打开伸缩魔杖。", expression: "镇定、自信。", lines: ["（郑重）真正的教授，当然要先拿出属于自己的魔杖。"], prep: "这根是妈妈自己的教授魔杖，不和弟弟后面的魔杖混用。" },
          { kind: "dialogue", speaker: "弟弟", action: "站在舞台中央，双手站好，不提前亮出自己的魔杖。", expression: "认真、带一点期待。", lines: ["（清楚）我是今天来参加入学考验的新生小巫师。"], prep: "弟弟第二幕才拿出自己的魔杖，这一幕不提前露。" },
          { kind: "dialogue", speaker: "妈妈", action: "抬手轻轻指向弟弟，像正式介绍一位新生。", expression: "庄重、带审视感。", lines: ["（庄重）今天站在这里的，是一位即将接受考验的新生小巫师。", "（缓缓推进）想进入魔法学校，并不是一件容易的事。", "（点名）新生，请告诉我，你准备好了吗？"], prep: "问完留半拍，等弟弟清楚回应。" },
          { kind: "dialogue", speaker: "弟弟", action: "站直、抬头、大声回答。", expression: "兴奋、自信。", lines: ["（响亮）我准备好了！"], prep: "第一幕后不额外停顿，直接转第二幕。" }
        ]},
        { id: "s2", act: "第二幕", title: "证明你是巫师 + 空盒呈现物品 + 空纸袋开出花", duration: "约 80 秒", objective: "先证明弟弟已经是“真正的新生巫师”，再让他展示属于自己的魔法天分。", summary: "这一幕既要完成身份建立，也要给观众第一次连续的视觉惊喜。", beats: [
          { kind: "dialogue", speaker: "妈妈", action: "让出舞台中心，从桌上把空盒递给弟弟。", expression: "像正式宣布第一项考试。", lines: ["（正式）第一关，请证明你不是普通的小朋友，而是真正收到邀请的新生。"], prep: "空盒由妈妈递到弟弟手里，桌面上其他道具先不碰。" },
          { kind: "dialogue", speaker: "弟弟", action: "接过空盒，站稳。", expression: "自信、痛快。", lines: ["（自信）我当然已经准备好了！"], prep: "接话后立刻展示空盒。" },
          { kind: "magic", speaker: "弟弟", action: "拿起空盒，先给前排和中间观众看里面是空的，再挥杖完成呈现。", expression: "认真、像真的在接受考试。", lines: ["（认真展示）大家看，现在这里面还什么都没有。", "（开心）这是我的录取信。", "（开心）这是我的眼镜。", "（开心）这是我的学院围巾。"], prep: "每拿一件都停一下。呈现结束后，妈妈立刻把空盒和物品接过去。" },
          { kind: "dialogue", speaker: "妈妈", action: "顺手接过空盒和物品，侧身放回桌上，再重新看向弟弟。", expression: "认可，但故意继续追问。", lines: ["（满意）很好。看起来你确实已经收到了霍格沃茨的邀请。", "（继续考验）不过，我还想看看，你是不是已经有真正的小巫师天分了。"], prep: "这个动作必须干净，避免弟弟手里一直拿着前一个魔法的物品。" },
          { kind: "magic", speaker: "弟弟", action: "从披风内侧自然拿出自己的魔杖，高举一下给观众看。", expression: "得意、带一点“我当然有”的感觉。", lines: ["（得意）我的魔杖一直都在我身上。"], prep: "这根魔杖后面继续沿用，不再换成另一根。" },
          { kind: "dialogue", speaker: "妈妈", action: "从桌上拿起牛皮纸袋递给弟弟，再退半步把舞台让出来。", expression: "期待、像老师要看学生现场发挥。", lines: ["（期待）那就再施一个真正的魔法给大家看看。", "（鼓励）让大家看看，你到底能不能把美好的东西真正请出来。"], prep: "纸袋由妈妈递给弟弟，明确道具怎么上场。" },
          { kind: "magic", speaker: "弟弟", action: "接过牛皮纸袋，先展示袋子是空的，再挥动魔杖，最后从纸袋里依次拿出 3 个花盒。", expression: "先认真，再在拿出花盒时明显惊喜。", lines: ["（认真展示）这个纸袋子里，现在也是空的。", "（施法）小小纸袋，开出花来。", "（惊喜）一朵。", "（惊喜）两朵。", "（惊喜）三朵。"], prep: "3 个花盒按顺序拿。结束后，纸袋和花盒都交给妈妈收走。" }
        ]},
        { id: "s3", act: "第三幕", title: "展示学习能力 + 魔杖点书 + 魔法书显现内容", duration: "约 50 秒", objective: "把故事从“有天分”推进到“会学习”，让成长更完整。", summary: "这一幕更像一节被看见的“魔法入门课”，用绘本式变化让能力成长更自然。", beats: [
          { kind: "dialogue", speaker: "妈妈", action: "从桌上把魔法书递给弟弟，像老师在抽查课本。", expression: "认真，但带鼓励。", lines: ["（认真）不过，光有天分还不够。真正的小巫师，还要会学习魔法。", "（抽查）把你的教材打开，让我们看看，你有没有认真准备第一堂课。"], prep: "书由妈妈递给弟弟，避免道具来历不明。" },
          { kind: "magic", speaker: "弟弟", action: "举起书先展示空白页，再用自己的魔杖轻轻点一下书。", expression: "认真、像真的在唤醒一本魔法书。", lines: ["（认真）刚开始的时候，它还什么都没有。", "（展示）你看，现在还是空白的。", "（轻轻施法）那我就用魔杖，轻轻叫醒它。"], prep: "加上“魔杖点书”动作，让魔杖和魔法书有互动。" },
          { kind: "dialogue", speaker: "妈妈", action: "微微点头，像老师继续追问。", expression: "鼓励、期待。", lines: ["（启发）空白的书，可学不会魔法。那怎么办呢？"], prep: "这句后弟弟立刻翻下一页。" },
          { kind: "magic", speaker: "弟弟", action: "慢慢翻到线稿页，再翻到彩色页，每次翻页后都停一下给观众看。", expression: "看到变化时要明显惊喜。", lines: ["（惊喜）有变化了。", "（惊喜）魔法图案已经慢慢出现了。", "（更兴奋）再认真一点，它就全部学会了！"], prep: "翻页慢一点。结束后妈妈顺手把书接过去放回桌面。" }
        ]},
        { id: "s4", act: "第四幕", title: "分院开始 + 戴上分院帽 + 帽中拿出分院结果", duration: "约 45 秒", objective: "让气氛抬高，让全场参与，同时把分院结果做得清楚、可控。", summary: "这一幕是全场气氛的抬升点，要有仪式感，也要有可控互动。", beats: [
          { kind: "dialogue", speaker: "妈妈", action: "从桌上拿起分院帽，走到弟弟身边。", expression: "庄重、带一点神秘感。", lines: ["（庄重）很好。你已经通过了前面的考验。", "（郑重）接下来，就是每一位霍格沃茨新生最重要的时刻。", "（宣布）分院仪式，现在开始。"], prep: "分院帽这一幕必须真正上场，不再只靠口播。" },
          { kind: "magic", speaker: "妈妈", action: "把分院帽轻轻戴到弟弟头上，再扶正。", expression: "认真，像在进行正式仪式。", lines: ["（解释）每一个学院都有自己的特点。", "（引导）等会儿如果你觉得，这位新生应该去最勇敢的那个学院，就跟我一起大声喊出来。"], prep: "就算小朋友不熟悉哈利波特，也能通过“最勇敢的学院”理解互动。" },
          { kind: "dialogue", speaker: "妈妈", action: "转向观众抬手带节奏。", expression: "带动、热烈。", lines: ["（带动）请大家一起喊出你们的答案。", "（大声）如果你觉得他应该去最勇敢的那个学院，就跟我一起喊：格兰芬多！"], prep: "互动口令统一收束到格兰芬多，避免现场喊乱。" },
          { kind: "dialogue", speaker: "全场", action: "一起回应。", expression: "热烈。", lines: ["（齐声）格兰芬多！"], prep: "互动只做一轮，不拖长。" },
          { kind: "magic", speaker: "弟弟", action: "双手扶住帽子，从帽中拿出提前藏好的信封或折叠学院信息纸，慢慢展开。", expression: "认真、带悬念。", lines: ["（神秘）分院帽已经把答案告诉我了。", "（慢慢揭晓）我来看看，上面写的是......"], prep: "信封或折叠学院纸提前藏在帽里。学院信息纸和徽章属于这一幕必备物料。" },
          { kind: "dialogue", speaker: "弟弟", action: "举起结果给观众看。", expression: "惊喜、兴奋。", lines: ["（兴奋）格兰芬多！"], prep: "结果展示后，妈妈立刻把帽子接过去放桌边。" }
        ]},
        { id: "s5", act: "第五幕", title: "第一堂魔法课 + 同一根魔杖开出花", duration: "约 45 秒", objective: "把成长推到最高点，让观众看到“他真的学会了新的魔法”。", summary: "这一幕不是单纯出花，而是整场故事里最关键的成长证明。", beats: [
          { kind: "dialogue", speaker: "妈妈", action: "把分院帽接走放桌边，再重新转回弟弟。", expression: "从庄重切到温和教学。", lines: ["（温和）恭喜你完成分院。", "（铺垫）不过，真正的魔法学校生活，现在才刚刚开始。", "（教学口吻）接下来，我要教你第一堂真正的魔法课。"], prep: "这一幕默认直接沿用弟弟第二幕拿出的同一根魔杖。" },
          { kind: "dialogue", speaker: "妈妈", action: "像老师正式介绍课程。", expression: "温和、期待。", lines: ["（清楚）这道魔法，叫做让美好的东西开花。"], prep: "把“同一根魔杖继续施法”的逻辑说顺即可。" },
          { kind: "dialogue", speaker: "弟弟", action: "握紧自己手里的魔杖，准备施法。", expression: "期待、自信。", lines: ["（积极）我来试试！"], prep: "动作准备要利落。" },
          { kind: "dialogue", speaker: "妈妈", action: "像老师一样给出简短口令。", expression: "鼓励。", lines: ["（提醒）动作要稳。", "（提醒）魔杖举好。", "（发令）现在，开始施法。"], prep: "妈妈的话要短，不把高潮说散。" },
          { kind: "magic", speaker: "弟弟", action: "认真挥杖，用同一根魔杖完成开花。花出来后先看花，再看观众。", expression: "明显惊喜。", lines: ["（惊喜）我成功了！"], prep: "花出来后停半拍。结束后花留在弟弟手里，直接带入结尾氛围也可以。" }
        ]},
        { id: "s6", act: "第六幕", title: "妈妈点题毕业 + 弟弟空袋送礼物", duration: "约 45 秒", objective: "从霍格沃茨故事自然落回毕业典礼，用礼物和祝福完成收束。", summary: "结尾既要回到毕业主题，也要把“分享”这件事落成一个看得见的动作。", beats: [
          { kind: "dialogue", speaker: "妈妈", action: "往前半步，像老师也像家长，先把主题点出来。", expression: "温柔、带祝福。", lines: ["（温柔）经过一学年的学习，小魔法师们也都要毕业了。", "（点题）大家都要带着今天学会的勇敢和快乐，去新的学校，学习新的本领。"], prep: "结尾点题由妈妈来说，不再把长段发言压给弟弟。" },
          { kind: "dialogue", speaker: "妈妈", action: "从桌上把礼物袋递给弟弟，再退半步把舞台让出来。", expression: "期待、像在把最后一项任务交给小魔法师。", lines: ["（郑重交接）现在，就请我们的小魔法师，把礼物送给大家吧。"], prep: "礼物袋由妈妈递给弟弟，明确道具怎么上场。" },
          { kind: "magic", speaker: "弟弟", action: "接过礼物袋，先展示空袋，再施法变出第一批礼物。", expression: "认真施法，礼物出来时自然开心。", lines: ["（认真展示）这个礼物袋里，现在也是空的。", "（施法）我要把礼物送给大家。", "（开心）真的变出来了！"], prep: "展示空袋、再变出第一批礼物。动作要清楚，不要一下略过去。" },
          { kind: "dialogue", speaker: "弟弟", action: "拿着第一批礼物往前一步，做出准备送出去的动作。", expression: "开心、真诚。", lines: ["（开心）这些礼物送给大家。", "（真诚）祝大家毕业快乐！"], prep: "如果现场方便，可以象征性往前送出第一份；不方便就停在舞台前沿展示。" }
        ]}
      ],

        { c:"辅助物料", n:"节目流程单", s:"候场区", p:"给妈妈和现场协助老师快速看顺序与音乐点。", t:"support" },
        { c:"候场", n:"饮用水", s:"候场区", p:"孩子上场前如果紧张、口干，可以小口补水。", t:"support" },
        { c:"候场", n:"纸巾", s:"候场区", p:"用于擦手、擦汗、整理妆发或清理道具表面。", t:"support" }
      ]
    };

    const state = { tab: "background", kind: "all", speaker: "all", search: "", scene: "all", category: "all" };

    const jumpList = document.getElementById("jump-list");
    const sceneList = document.getElementById("scene-list");
    const backgroundList = document.getElementById("background-list");
    const materialSummary = document.getElementById("material-summary");
    const materialGrid = document.getElementById("material-grid");
    const sceneFilter = document.getElementById("scene-filter");
    const categoryFilter = document.getElementById("category-filter");
    const searchInput = document.getElementById("search-input");

    function esc(v){return String(v).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;")}
    function toneClass(kind){return kind==="magic"?"magic":"dialogue"}
    function speakerClass(v){if(v==="妈妈") return "mom"; if(v==="弟弟") return "kid"; return "crowd";}
    function materialClass(v){if(v==="core") return "core"; if(v==="backup") return "kid"; return "crowd";}
    function materialTag(v){if(v==="core") return "核心魔术"; if(v==="backup") return "备份"; return "执行支持";}

    function getVisibleBeats(scene){
      return scene.beats.filter(beat=>{
        if(state.kind!=="all" && beat.kind!==state.kind) return false;
        if(state.speaker!=="all" && beat.speaker!==state.speaker) return false;
        return true;
      });
    }

    function renderSceneJump(){
      jumpList.innerHTML = data.scenes.map((scene,idx)=>`<button class="jump ${idx===0?"active":""}" data-jump="${scene.id}"><small>${scene.act}</small><strong>${esc(scene.title)}</strong><span>${esc(scene.summary)}</span></button>`).join("");
    }

    function renderScenes(){
      sceneList.innerHTML = data.scenes.map((scene,idx)=>{
        const beats = getVisibleBeats(scene);
        const magicCount = scene.beats.filter(b=>b.kind==="magic").length;
        const items = beats.length ? beats.map((beat,i)=>`
          <article class="beat ${toneClass(beat.kind)}">
            <div class="speaker-panel ${speakerClass(beat.speaker)}">
              <div class="speaker-meta">
                <span class="speaker-index">${i+1}:</span>
                <span class="speaker-role">${esc(beat.speaker)}</span>
                <span class="speaker-type ${toneClass(beat.kind)}">${beat.kind==="magic"?"魔法呈现":"情景对话"}</span>
              </div>
            </div>
            <div class="beat-content">
              <div class="beat-grid">
                <div>
                  <div class="quote"><strong>动作 / 表情</strong><div>${esc(beat.action)} <span style="color:var(--muted)">｜</span> ${esc(beat.expression)}</div></div>
                  <div class="dialogue-box">
                    <strong>台词</strong>
                    <ul class="lines">${beat.lines.map(line=>`<li>${esc(line)}</li>`).join("")}</ul>
                  </div>
                </div>
                <aside class="prep"><strong>提醒</strong><div>${esc(beat.prep)}</div></aside>
              </div>
            </div>
          </article>
        `).join("") : `<div class="empty">当前筛选条件下，这一幕没有匹配内容。</div>`;
        return `
          <details class="scene-card" id="${scene.id}" ${idx===0?'open':""}>
            <summary>
              <div class="scene-main">
                <small>${esc(scene.act)}</small>
                <h3>${esc(scene.title)}</h3>
                <p>${esc(scene.summary)}</p>
              </div>
              <div class="scene-tags">
                <span class="tag">${esc(scene.duration)}</span>
                <span class="tag gold">${scene.beats.length} 条执行</span>
                <span class="tag green">${magicCount} 条魔法</span>
              </div>
            </summary>
            <div class="scene-body">
              <div class="scene-meta">
                <article class="info">
                  <h4>这一幕的任务</h4>
                  <p>${esc(scene.objective)}</p>
                </article>
              </div>
              <div class="beat-list">${items}</div>
            </div>
          </details>
        `;
      }).join("");
    }

    function renderBackground(){
      backgroundList.innerHTML = data.background.map((section,idx)=>`
        <details class="accordion" ${idx===0?"open":""}>
          <summary>
            <div>
              <h3>${esc(section.title)}</h3>
              <p>${esc(section.summary)}</p>
            </div>
            <span class="tag">展开查看</span>
          </summary>
          <div class="body">
            <ul>${section.bullets.map(item=>`<li>${esc(item)}</li>`).join("")}</ul>
          </div>
        </details>
      `).join("");
    }

    function unique(list){return ["all",...new Set(list)]}

    function initMaterialFilters(){
      unique(data.materials.map(i=>i.s)).forEach(v=>{
        const label = v==="all"?"全部幕次":v;
        sceneFilter.insertAdjacentHTML("beforeend",`<option value="${esc(v)}">${esc(label)}</option>`);
      });
      unique(data.materials.map(i=>i.c)).forEach(v=>{
        const label = v==="all"?"全部类别":v;
        categoryFilter.insertAdjacentHTML("beforeend",`<option value="${esc(v)}">${esc(label)}</option>`);
      });
    }

    function getFilteredMaterials(){
      return data.materials.filter(item=>{
        const q = state.search.trim().toLowerCase();
        const hay = `${item.n} ${item.p} ${item.c} ${item.s}`.toLowerCase();
        if(q && !hay.includes(q)) return false;
        if(state.scene!=="all" && item.s!==state.scene) return false;
        if(state.category!=="all" && item.c!==state.category) return false;
        return true;
      });
    }

    function renderMaterials(){
      const list = getFilteredMaterials();
      const coreCount = data.materials.filter(i=>i.t==="core").length;
      const backupCount = data.materials.filter(i=>i.t==="backup").length;
      materialSummary.innerHTML = [
        {label:"总物料",value:`${data.materials.length} 项`,sub:"当前飞书版本里每个物品都拆成单独一行。"},
        {label:"核心魔术",value:`${coreCount} 项`,sub:"优先采购或先稳定彩排的关键道具。"},
        {label:"备份项",value:`${backupCount} 项`,sub:"纸类、音频和易损项都做了单独备份。"},
        {label:"当前筛选后",value:`${list.length} 项`,sub:"支持按名称、幕次、类别快速查找。"}
      ].map(i=>`<article class="stat"><small>${i.label}</small><strong>${i.value}</strong><span>${i.sub}</span></article>`).join("");
      materialGrid.innerHTML = list.length ? list.map(item=>`
        <article class="material-card">
          <div class="material-top">
            <h3>${esc(item.n)}</h3>
            <span class="b ${materialClass(item.t)}">${materialTag(item.t)}</span>
          </div>
          <div class="meta">
            <span class="tag">${esc(item.c)}</span>
            <span class="tag gold">${esc(item.s)}</span>
          </div>
          <p>${esc(item.p)}</p>
        </article>
      `).join("") : `<div class="empty">没有匹配到物料。可以清空搜索词，或把幕次 / 类别筛选切回“全部”。</div>`;
    }

    function bindTabs(){
      document.querySelectorAll(".tab-btn").forEach(btn=>{
        btn.addEventListener("click",()=>{
          const tab = btn.dataset.tab;
          state.tab = tab;
          document.querySelectorAll(".tab-btn").forEach(b=>b.classList.toggle("active", b===btn));
          document.querySelectorAll(".tab-panel").forEach(panel=>panel.classList.toggle("active", panel.id===`tab-${tab}`));
        });
      });
    }

    function bindFilters(){
      document.querySelectorAll("[data-kind]").forEach(btn=>{
        btn.addEventListener("click",()=>{
          state.kind = btn.dataset.kind;
          document.querySelectorAll("[data-kind]").forEach(b=>b.classList.toggle("active", b===btn));
          renderScenes();
        });
      });
      document.querySelectorAll("[data-speaker]").forEach(btn=>{
        btn.addEventListener("click",()=>{
          state.speaker = btn.dataset.speaker;
          document.querySelectorAll("[data-speaker]").forEach(b=>b.classList.toggle("active", b===btn));
          renderScenes();
        });
      });
      document.getElementById("expand-all").addEventListener("click",()=>{document.querySelectorAll(".scene-card").forEach(card=>{card.open=true})});
      document.getElementById("collapse-all").addEventListener("click",()=>{document.querySelectorAll(".scene-card").forEach(card=>{card.open=false})});
      jumpList.addEventListener("click",e=>{
        const btn = e.target.closest("[data-jump]");
        if(!btn) return;
        document.querySelectorAll("[data-jump]").forEach(node=>node.classList.toggle("active", node===btn));
        const target = document.getElementById(btn.dataset.jump);
        if(target){
          target.open = true;
          target.scrollIntoView({behavior:"smooth", block:"start"});
        }
      });
      searchInput.addEventListener("input",e=>{state.search=e.target.value;renderMaterials()});
      sceneFilter.addEventListener("change",e=>{state.scene=e.target.value;renderMaterials()});
      categoryFilter.addEventListener("change",e=>{state.category=e.target.value;renderMaterials()});
    }

    renderSceneJump();
    renderScenes();
    renderBackground();
    initMaterialFilters();
    renderMaterials();
    bindTabs();
    bindFilters();
  </script>
</body>
</html>
